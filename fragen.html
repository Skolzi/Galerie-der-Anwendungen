<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fragen & Antworten</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e12;
  --surface: #16161c;
  --surface2: #1e1e26;
  --border: #2a2a36;
  --accent: #ff6b6b;
  --accent-glow: rgba(255,107,107,0.2);
  --blue: #6b9fff;
  --text: #f0eff5;
  --muted: #7a7a90;
  --green: #6bffb8;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'Mulish', sans-serif;
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 10% 0%, rgba(107,159,255,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 80%, rgba(255,107,107,0.07) 0%, transparent 50%);
}

.layout {
  display: grid;
  grid-template-columns: 1fr 280px;
  grid-template-rows: auto 1fr;
  max-width: 1100px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem;
  gap: 2rem;
  min-height: 100vh;
}

/* Header */
.header {
  grid-column: 1 / -1;
}

.header-eyebrow {
  font-size: 0.7rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--blue);
  font-weight: 600;
  margin-bottom: 0.5rem;
}

h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 800;
  line-height: 1;
  background: linear-gradient(135deg, var(--text) 40%, var(--muted));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.4rem;
}

.header-sub {
  color: var(--muted);
  font-size: 0.9rem;
  font-weight: 300;
}

/* Main column */
.main-col { display: flex; flex-direction: column; gap: 1.5rem; min-width: 0; }

/* Ask box */
.ask-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
}

.ask-box label {
  display: block;
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--blue);
  font-weight: 600;
  margin-bottom: 0.75rem;
}

.name-row {
  margin-bottom: 0.9rem;
}

.name-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.7rem 1rem;
  color: var(--text);
  font-family: 'Mulish', sans-serif;
  font-size: 0.95rem;
  font-weight: 400;
  width: 260px;
  max-width: 100%;
  transition: border-color 0.2s;
  outline: none;
}

.name-input::placeholder { color: var(--muted); }
.name-input:focus { border-color: var(--accent); }

.ask-row {
  display: flex;
  gap: 0.75rem;
  align-items: flex-end;
}

.ask-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.85rem 1rem;
  color: var(--text);
  font-family: 'Mulish', sans-serif;
  font-size: 0.95rem;
  font-weight: 400;
  resize: vertical;
  min-height: 80px;
  transition: border-color 0.2s;
  outline: none;
}

.ask-input::placeholder { color: var(--muted); }
.ask-input:focus { border-color: var(--blue); }

.ask-btn {
  background: var(--blue);
  color: #0e0e12;
  border: none;
  border-radius: 10px;
  padding: 0.85rem 1.5rem;
  font-family: 'Mulish', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  white-space: nowrap;
  align-self: flex-end;
}

.ask-btn:hover { background: #8ab5ff; transform: translateY(-1px); }
.ask-btn:active { transform: translateY(0); }

/* Feed */
.feed { display: flex; flex-direction: column; gap: 1rem; }

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--muted);
  font-size: 0.9rem;
}

.empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

/* Comment card */
.comment-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.2rem 1.4rem;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity:0; transform: translateY(12px); }
  to   { opacity:1; transform: translateY(0); }
}

.comment-meta {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.7rem;
}

.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem;
  font-weight: 700;
  flex-shrink: 0;
}

.meta-info { flex: 1; }
.meta-name { font-size: 0.82rem; font-weight: 700; }
.meta-time { font-size: 0.7rem; color: var(--muted); }

.question-badge {
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 0.2rem 0.5rem;
  border-radius: 100px;
  background: rgba(107,159,255,0.15);
  color: var(--blue);
  border: 1px solid rgba(107,159,255,0.3);
}

.comment-text {
  font-size: 0.95rem;
  line-height: 1.6;
  color: var(--text);
  margin-bottom: 0.9rem;
  font-weight: 400;
}

.comment-actions {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.action-btn {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.4rem 0.8rem;
  color: var(--muted);
  font-family: 'Mulish', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.action-btn:hover { border-color: var(--accent); color: var(--accent); }

.heart-btn.liked {
  background: var(--accent-glow);
  border-color: var(--accent);
  color: var(--accent);
}

.heart-btn.liked .heart-icon { animation: heartPop 0.3s ease; }

@keyframes heartPop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.4); }
  100% { transform: scale(1); }
}

.reply-btn:hover { border-color: var(--blue); color: var(--blue); }

/* Replies */
.replies {
  margin-top: 0.9rem;
  padding-top: 0.9rem;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.reply-card {
  display: flex;
  gap: 0.7rem;
  align-items: flex-start;
  animation: slideIn 0.2s ease;
}

.reply-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 2px;
}

.reply-body { flex: 1; }

.reply-name {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--green);
  margin-bottom: 0.2rem;
}

.reply-text {
  font-size: 0.85rem;
  color: #c8c8d8;
  line-height: 1.5;
}

/* Reply input */
.reply-input-row {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.75rem;
}

.reply-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.5rem 0.8rem;
  color: var(--text);
  font-family: 'Mulish', sans-serif;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}

.reply-input::placeholder { color: var(--muted); }
.reply-input:focus { border-color: var(--green); }

.reply-send {
  background: var(--green);
  color: #0e0e12;
  border: none;
  border-radius: 8px;
  padding: 0.5rem 1rem;
  font-family: 'Mulish', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
}

.reply-send:hover { background: #8affcf; }

/* Sidebar */
.sidebar { display: flex; flex-direction: column; gap: 1rem; }

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.3rem;
}

.stat-card-title {
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 1rem;
}

.stat-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
}

.stat-row:last-child { border-bottom: none; padding-bottom: 0; }
.stat-row:first-of-type { padding-top: 0; }

.stat-label {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.82rem;
  color: var(--muted);
  font-weight: 400;
}

.stat-value {
  font-family: 'Syne', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
}

/* Top heart card */
.top-card {
  background: var(--surface);
  border: 1px solid rgba(255,107,107,0.3);
  border-radius: 14px;
  padding: 1.3rem;
  background-image: radial-gradient(ellipse at 100% 0%, rgba(255,107,107,0.08), transparent 60%);
}

.top-card-title {
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.top-message {
  font-size: 0.88rem;
  line-height: 1.6;
  color: var(--text);
  font-style: italic;
  margin-bottom: 0.6rem;
}

.top-hearts {
  font-size: 0.75rem;
  color: var(--accent);
  font-weight: 700;
}

.top-empty {
  font-size: 0.82rem;
  color: var(--muted);
  font-style: italic;
}

@media (max-width: 700px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { order: -1; }
  .stat-card .stat-row { padding: 0.35rem 0; }
}
</style>
</head>
<body>
<div class="layout">

  <div class="header">
    <p class="header-eyebrow">Community Board</p>
    <h1>Fragen &amp; Antworten</h1>
    <p class="header-sub">Stelle eine Frage, antworte anderen oder verteile ein Herz ❤️</p>
  </div>

  <div class="main-col">
    <div class="ask-box">
      <div class="name-row">
        <label for="nameInput" style="display:block;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:0.5rem;">Dein Name</label>
        <input class="name-input" id="nameInput" type="text" placeholder="Wie heißt du?">
      </div>
      <label for="questionInput">Deine Frage</label>
      <div class="ask-row">
        <textarea class="ask-input" id="questionInput" placeholder="Was möchtest du fragen?"></textarea>
        <button class="ask-btn" onclick="postQuestion()">Fragen →</button>
      </div>
    </div>

    <div class="feed" id="feed">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">💬</div>
        <div>Noch keine Fragen – sei der Erste!</div>
      </div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="stat-card">
      <div class="stat-card-title">📊 Statistik</div>
      <div class="stat-row">
        <span class="stat-label">💬 Fragen gestellt</span>
        <span class="stat-value" id="statQuestions" style="color:var(--blue)">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">↩️ Antworten</span>
        <span class="stat-value" id="statReplies" style="color:var(--green)">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">❤️ Herzen vergeben</span>
        <span class="stat-value" id="statHearts" style="color:var(--accent)">0</span>
      </div>
    </div>

    <div class="top-card">
      <div class="top-card-title">🏆 Beliebteste Nachricht</div>
      <div id="topMessage"><span class="top-empty">Noch keine Herzen vergeben.</span></div>
    </div>
  </aside>

</div>

<script>
const API_KEY = '$2a$10$TXUqnwNhcvPxxqhlXk0I7.zgz5UnX326eyIpoay2PwgtPj.h0Gbt6';
const BIN_ID  = '69cba5e0aaba882197ae8f1a';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const avatarColors = ['#6b9fff','#ff6b6b','#6bffb8','#ffb86b','#c86bff','#ff6bda'];
const avatarLetters = ['J','M','A','K','S','T','L','R','P','N'];

let questions = [];
let totalHearts = 0;
let totalReplies = 0;

// ── JSONBin helpers ──────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(BIN_URL + '/latest', {
      headers: { 'X-Master-Key': API_KEY }
    });
    const json = await res.json();
    const data = json.record;
    questions   = data.questions   || [];
    totalHearts = data.totalHearts || 0;
    totalReplies= data.totalReplies|| 0;
  } catch(e) {
    console.error('Laden fehlgeschlagen', e);
  }
}

async function saveData() {
  try {
    await fetch(BIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY
      },
      body: JSON.stringify({ questions, totalHearts, totalReplies })
    });
  } catch(e) {
    console.error('Speichern fehlgeschlagen', e);
  }
}

async function init() {
  document.getElementById('feed').innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div>Fragen werden geladen...</div></div>';
  await loadData();
  renderAll();
  updateStats();
}

function renderAll() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  if (questions.length === 0) {
    feed.innerHTML = '<div class="empty-state" id="emptyState"><div class="empty-icon">💬</div><div>Noch keine Fragen – sei der Erste!</div></div>';
    return;
  }
  questions.forEach(q => renderQuestion(q, false));
}

function randomAvatar() {
  const color = avatarColors[Math.floor(Math.random() * avatarColors.length)];
  const letter = avatarLetters[Math.floor(Math.random() * avatarLetters.length)];
  return { color, letter };
}

function timeAgo() {
  return 'gerade eben';
}

function updateStats() {
  document.getElementById('statQuestions').textContent = questions.length;
  document.getElementById('statReplies').textContent = totalReplies;
  document.getElementById('statHearts').textContent = totalHearts;

  // Top message
  const allItems = [];
  questions.forEach(q => {
    allItems.push({ text: q.text, hearts: q.hearts });
    q.replies.forEach(r => allItems.push({ text: r.text, hearts: 0 }));
  });

  const top = questions.slice().sort((a,b) => b.hearts - a.hearts)[0];
  const topEl = document.getElementById('topMessage');
  if (top && top.hearts > 0) {
    topEl.innerHTML = `<p class="top-message">"${top.text}"</p><p class="top-hearts">❤️ ${top.hearts} ${top.hearts === 1 ? 'Herz' : 'Herzen'}</p>`;
  } else {
    topEl.innerHTML = '<span class="top-empty">Noch keine Herzen vergeben.</span>';
  }
}

async function postQuestion() {
  const input = document.getElementById('questionInput');
  const nameInput = document.getElementById('nameInput');
  const text = input.value.trim();
  if (!text) return;
  const authorName = nameInput.value.trim() || 'Anonym';

  const av = randomAvatar();
  const q = {
    id: Date.now(),
    text,
    author: authorName,
    avatar: av,
    hearts: 0,
    liked: false,
    replies: [],
    showReplyInput: false
  };

  questions.unshift(q);
  input.value = '';

  const emptyState = document.getElementById('emptyState');
  if (emptyState) emptyState.remove();

  renderQuestion(q, true);
  updateStats();
  await saveData();
}

function renderQuestion(q, prepend = false) {
  const feed = document.getElementById('feed');

  const card = document.createElement('div');
  card.className = 'comment-card';
  card.id = `q-${q.id}`;
  card.innerHTML = buildCardHTML(q);

  if (prepend) {
    feed.insertBefore(card, feed.firstChild);
  } else {
    feed.appendChild(card);
  }
}

function buildCardHTML(q) {
  const repliesHTML = q.replies.map(r => `
    <div class="reply-card">
      <div class="reply-avatar" style="background:${r.avatar.color}22; color:${r.avatar.color}">${r.avatar.letter}</div>
      <div class="reply-body">
        <div class="reply-name">Anonym</div>
        <div class="reply-text">${escHtml(r.text)}</div>
      </div>
    </div>
  `).join('');

  const repliesSection = (q.replies.length > 0 || q.showReplyInput) ? `
    <div class="replies">
      ${repliesHTML}
      ${q.showReplyInput ? `
        <div class="reply-input-row">
          <input class="reply-input" id="ri-${q.id}" placeholder="Deine Antwort..." onkeydown="if(event.key==='Enter')sendReply(${q.id})">
          <button class="reply-send" onclick="sendReply(${q.id})">Senden</button>
        </div>
      ` : ''}
    </div>
  ` : '';

  return `
    <div class="comment-meta">
      <div class="avatar" style="background:${q.avatar.color}22; color:${q.avatar.color}">${q.avatar.letter}</div>
      <div class="meta-info">
        <div class="meta-name">${q.author}</div>
        <div class="meta-time">gerade eben</div>
      </div>
      <span class="question-badge">Frage</span>
    </div>
    <div class="comment-text">${escHtml(q.text)}</div>
    <div class="comment-actions">
      <button class="action-btn heart-btn ${q.liked ? 'liked' : ''}" onclick="toggleHeart(${q.id})">
        <span class="heart-icon">❤️</span> <span>${q.hearts}</span>
      </button>
      <button class="action-btn reply-btn" onclick="toggleReplyInput(${q.id})">
        💬 Antworten
      </button>
    </div>
    ${repliesSection}
  `;
}

function refreshCard(q) {
  const card = document.getElementById(`q-${q.id}`);
  if (card) card.innerHTML = buildCardHTML(q);
}

async function toggleHeart(id) {
  const q = questions.find(x => x.id === id);
  if (!q) return;
  if (q.liked) {
    q.hearts--;
    totalHearts--;
    q.liked = false;
  } else {
    q.hearts++;
    totalHearts++;
    q.liked = true;
  }
  refreshCard(q);
  updateStats();
  await saveData();
}

function toggleReplyInput(id) {
  const q = questions.find(x => x.id === id);
  if (!q) return;
  q.showReplyInput = !q.showReplyInput;
  refreshCard(q);
  if (q.showReplyInput) {
    setTimeout(() => {
      const inp = document.getElementById(`ri-${id}`);
      if (inp) inp.focus();
    }, 50);
  }
}

async function sendReply(id) {
  const q = questions.find(x => x.id === id);
  if (!q) return;
  const inp = document.getElementById(`ri-${id}`);
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) return;

  q.replies.push({ text, avatar: randomAvatar() });
  totalReplies++;
  q.showReplyInput = false;
  refreshCard(q);
  updateStats();
  await saveData();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Allow Enter to post question (Shift+Enter for newline)
document.getElementById('questionInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    postQuestion();
  }
});

// Start the app
init();
</script>
</body>
</html>
